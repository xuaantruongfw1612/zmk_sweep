# -- CẤU HÌNH CHUNG --
CONFIG_ZMK_KEYBOARD_NAME="よこそ!!!"
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_STUDIO_LOCKING=n

# -- BLUETOOTH --
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=n

# -- NGUỒN & PIN --
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
CONFIG_ZMK_EXT_POWER=n
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=1200

# -- REPORT --
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# -- THIẾT BỊ --
CONFIG_ZMK_POINTING=n

# -- SOFT OFF --
CONFIG_ZMK_PM_SOFT_OFF=y

# -- DEBUG  --
CONFIG_LOG=n
CONFIG_UART_CONSOLE=n
CONFIG_SHELL=n

